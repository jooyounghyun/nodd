<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VYBE - Creator Platform</title>

  <!-- Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="aurora-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <vybe-header></vybe-header>

  <main class="container">
    
    <section class="hero" style="text-align: center; padding: 160px 24px;">
      <h2 style="font-size: clamp(40px, 10vw, 80px); line-height: 1.05; margin-bottom: 32px; font-weight: 800;">
        트렌디한 콘텐츠를<br/>
        <span class="gradient-text">가장 빠르게</span>
      </h2>
      <p style="color: var(--text-secondary); font-size: clamp(18px, 4vw, 22px); margin-bottom: 56px; font-weight: 500; max-width: 600px; margin-inline: auto;">
        검증된 Z세대 크리에이터와 함께<br/>바이럴의 정점에 올라타세요.
      </p>

      <vybe-button text="의뢰 시작하기" onclick="alert('의뢰 기능 준비중')"></vybe-button>
    </section>

    <vybe-section title="스타일 선택">
      <div id="style-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 32px;">
        <style-card title="감성 브이로그" description="시네마틱한 무드와 감각적인 편집으로 브랜드의 감성을 전달합니다."></style-card>
        <style-card title="밈 스타일" description="최신 트렌드와 유머를 결합하여 압도적인 전파력을 보장합니다."></style-card>
        <style-card title="정보형 쇼츠" description="핵심 내용을 1분 안에 임팩트 있게 전달하는 정보성 콘텐츠입니다."></style-card>
        <style-card title="광고형 영상" description="데이터 기반의 기획으로 실질적인 전환과 매출을 이끌어냅니다."></style-card>
      </div>
    </vybe-section>

    <vybe-section title="추천 크리에이터">
      <div class="creator-list" style="display: flex; gap: 32px; overflow-x: auto; padding-bottom: 32px; scrollbar-width: none; -ms-overflow-style: none;">
        <creator-card name="Creator A" tag="조회수 100만+ 영상 다수 보유"></creator-card>
        <creator-card name="Creator B" tag="감성 기반 브랜딩 콘텐츠 전문"></creator-card>
        <creator-card name="Creator C" tag="Z세대 타겟 밈 콘텐츠 전문가"></creator-card>
        <creator-card name="Creator D" tag="퍼포먼스 마케팅 최적화 쇼츠"></creator-card>
      </div>
    </vybe-section>

  </main>

  <footer style="padding: 100px 40px; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-secondary); font-size: 15px;">
    <p style="margin-bottom: 12px;">© 2026 VYBE. All rights reserved.</p>
    <div style="display: flex; justify-content: center; gap: 24px; margin-top: 20px;">
      <a href="#" style="color: inherit; text-decoration: none;">이용약관</a>
      <a href="#" style="color: inherit; text-decoration: none;">개인정보처리방침</a>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="main.js" type="module"></script>
</body>
</html>
